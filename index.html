<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debug Mode | Museum Dev Lab</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: red; /* Красный фон, чтобы сразу увидеть дыры в верстке */ }
    </style>
  </head>
  <body>

    <a-scene 
      renderer="colorManagement: true; antialias: false; foveationLevel: 0;"
      vr-mode-ui="enabled: false">

      <a-assets>
        <img id="floor-col" src="textures/floor_color.jpg">
        <img id="art1" src="assets/art1.jpg">
      </a-assets>

      <a-sky color="#ffffff"></a-sky>

      <a-box position="0 1.5 0" width="4" height="3" depth="7" 
             material="color: #ffffff; shader: flat; side: back;">
      </a-box>

      <a-plane position="0 0.01 0" rotation="-90 0 0" width="4" height="7" 
               material="src: #floor-col; shader: flat;"></a-plane>

      <a-entity position="-1.97 1.6 -2.25" rotation="0 90 0">
          <a-box width="0.66" height="0.9" depth="0.03" color="#111"></a-box>
          <a-image src="#art1" width="0.6" height="0.84" position="0 0 0.02" shader="flat"></a-image>
      </a-entity>

      <a-entity camera position="0 1.6 0" look-controls></a-entity>

    </a-scene>

    <script>
      // Принудительно заставляем холст проснуться
      window.addEventListener('load', () => {
        const scene = document.querySelector('a-scene');
        scene.addEventListener('loaded', () => {
           console.log("Scene loaded");
           scene.resize();
        });
      });
    </script>
  </body>
</html>
