<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Museum Dev Lab | Final Gallery</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #fff; }
    </script>
</head>
<body>

    <a-scene 
        renderer="colorManagement: true; antialias: true; precision: medium;"
        light="defaultLightsEnabled: false"
        vr-mode-ui="enabled: false">

        <a-assets id="assets-list">
            <img id="floor-col" src="textures/floor_color.jpg">
            <img id="floor-nor" src="textures/floor_normal.jpg">
            <img id="wall-nor" src="textures/wall_normal.jpg">
            </a-assets>

        <a-sky color="#ffffff"></a-sky>

        <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
        <a-light type="point" position="0 2.8 0" intensity="0.4" distance="12"></a-light>

        <a-box position="0 1.5 0" width="4" height="3" depth="7" 
               material="color: #ffffff; shader: standard; normalMap: #wall-nor; normalTextureRepeat: 4 2; side: back; roughness: 1;">
        </a-box>

        <a-plane position="0 0.01 0" rotation="-90 0 0" width="4" height="7" 
                 material="src: #floor-col; normalMap: #floor-nor; repeat: 4 7; roughness: 0.7;"></a-plane>

        <a-entity id="gallery-walls"></a-entity>

        <a-entity id="rig" movement-controls="controls: checkpoint" checkpoint-controls="mode: animate">
            <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
                <a-cursor color="#555" raycaster="objects: .checkpoint"></a-cursor>
            </a-entity>
        </a-entity>

        <a-circle class="checkpoint" position="0 0.05 2" radius="0.15" color="#000" opacity="0.1" rotation="-90 0 0"></a-circle>
        <a-circle class="checkpoint" position="0 0.05 0" radius="0.15" color="#000" opacity="0.1" rotation="-90 0 0"></a-circle>
        <a-circle class="checkpoint" position="0 0.05 -2" radius="0.15" color="#000" opacity="0.1" rotation="-90 0 0"></a-circle>

    </a-scene>

    <script>
        const gallery = document.querySelector('#gallery-walls');
        const assets = document.querySelector('#assets-list');

        // Координаты для 12 картин (A1 вертикальные)
        const coords = [
            // Левая стена (x: -1.97)
            { x: -1.97, y: 1.6, z: -2.25, rot: 90 },
            { x: -1.97, y: 1.6, z: -0.75, rot: 90 },
            { x: -1.97, y: 1.6, z: 0.75,  rot: 90 },
            { x: -1.97, y: 1.6, z: 2.25,  rot: 90 },
            // Правая стена (x: 1.97)
            { x: 1.97,  y: 1.6, z: -2.25, rot: -90 },
            { x: 1.97,  y: 1.6, z: -0.75, rot: -90 },
            { x: 1.97,  y: 1.6, z: 0.75,  rot: -90 },
            { x: 1.97,  y: 1.6, z: 2.25,  rot: -90 },
            // Передняя стена (z: -3.47)
            { x: -0.8,  y: 1.6, z: -3.47, rot: 0 },
            { x: 0.8,   y: 1.6, z: -3.47, rot: 0 },
            // Задняя стена (z: 3.47)
            { x: -0.8,  y: 1.6, z: 3.47,  rot: 180 },
            { x: 0.8,   y: 1.6, z: 3.47,  rot: 180 }
        ];

        // Генерируем 12 постеров
        coords.forEach((pos, i) => {
            const id = i + 1;
            
            // 1. Добавляем картинку в ассеты
            const img = document.createElement('img');
            img.setAttribute('id', `art${id}`);
            img.setAttribute('src', `assets/art${id}.jpg`);
            assets.appendChild(img);

            // 2. Создаем сущность картины
            const entity = document.createElement('a-entity');
            entity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
            entity.setAttribute('rotation', `0 ${pos.rot} 0`);
            
            entity.innerHTML = `
                <a-box width="0.66" height="0.9" depth="0.03" color="#111"></a-box>
                <a-image src="#art${id}" width="0.6" height="0.84" position="0 0 0.02" 
                         material="shader: standard; emissive: #fff; emissiveIntensity: 0.15"></a-image>
                <a-light type="spot" position="0 1.2 1" rotation="-45 0 0" intensity="0.4" penumbra="1" angle="45"></a-light>
            `;
            
            gallery.appendChild(entity);
        });
    </script>
</body>
</html>
