<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Museum Dev Lab | Optimized 12-gon Gallery</title>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; height: 100%; height: -webkit-fill-available; 
            overflow: hidden; position: fixed; background-color: #000; 
        }
        .a-canvas {
            position: fixed !important; top: 0 !important; left: 0 !important;
            width: 100vw !important; height: 100% !important;
        }
        .a-enter-vr { display: none !important; }

        #splash-screen {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #010101; color: #ffffff;
            z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif; cursor: pointer;
        }
        #splash-screen h1 { font-size: 2rem; margin-bottom: 20px; text-transform: uppercase; text-align: center; }
        #splash-screen p { color: #4facfe; font-size: 1.1rem; text-align: center; padding: 0 20px; transition: 0.3s; }
        .pulse-text { animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>Museum Dev Lab</h1>
        <p id="splash-text" class="pulse-text">Проверка устройства...</p>
    </div>

    <a-scene 
        webxr="requiredFeatures: local-floor; referenceSpaceType: local-floor"
        renderer="colorManagement: true; exposure: 1.2; antialias: true;"
        light="defaultLightsEnabled: false"
        loading-screen="enabled: false">

        <a-assets timeout="10000">
            <img id="wall-col" src="textures/wall_color.jpg?v=10">
            <img id="wall-nor" src="textures/wall_normal.jpg?v=10">
            <img id="floor-col" src="textures/floor_color.jpg?v=10">
        </a-assets>

        <a-sky color="#010101"></a-sky>

        <a-circle position="0 0.01 0" radius="10" rotation="-90 0 0" 
                  material="src: #floor-col; repeat: 24 24; normalMap: #floor-nor; normalScale: 0.2 0.2; roughness: 0.1; metalness: 0.6;"></a-circle>
        
        <a-circle position="0 6 0" radius="10" rotation="90 0 0" 
                  material="color: #050505; shader: standard; roughness: 1;"></a-circle>

        <a-light type="ambient" color="#ffffff" intensity="0.1"></a-light>

        <a-entity id="gallery-container"></a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera position="0 1.6 0" look-controls="pointerLockEnabled: false" wasd-controls></a-entity>
        </a-entity>

    </a-scene>

    <script>
        const gallery = document.querySelector('#gallery-container');
        const scene = document.querySelector('a-scene');
        
        const count = 12;      // 12 стен
        const radius = 7.5;    // Радиус зала
        
        // Индексы стен, на которых будут висеть картины (две группы по 3)
        // Группа 1: стены 11, 0, 1 (Центр - стена 0)
        // Группа 2: стены 5, 6, 7 (Центр - стена 6)
        const artWalls = [11, 0, 1, 5, 6, 7]; 
        let artCounter = 1;

        // Ловим падение видеопамяти на мобилках
        scene.addEventListener('loaded', function () {
            const canvas = document.querySelector('.a-canvas');
            if (canvas) {
                canvas.addEventListener('webglcontextlost', function (event) {
                    event.preventDefault();
                    const splash = document.getElementById('splash-screen');
                    splash.style.display = 'flex';
                    splash.innerHTML = `<h1 style="color: #ff4444;">CRASH</h1><p>Браузеру не хватило видеопамяти.<br>Сожмите текстуры.</p>`;
                }, false);
            }
        });

        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                const splashText = document.getElementById('splash-text');
                if (supported) {
                    splashText.innerHTML = "[ Коснитесь, чтобы войти в зал ]<br><br><span style='font-size: 0.8rem; color: #888;'>Вы сможете ходить физически</span>";
                } else {
                    splashText.innerHTML = "[ Кликните для входа ]<br><br><span style='font-size: 0.8rem; color: #888;'>(WASD для перемещения)</span>";
                }
            });
        }

        scene.addEventListener('loaded', () => {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                const rotY = -(i / count) * 360 - 90;

                const segment = document.createElement('a-entity');
                segment.setAttribute('position', `${x} 3 ${z}`);
                segment.setAttribute('rotation', `0 ${rotY} 0`);
                
                // Базовая стена (ширина 4.05 для радиуса 7.5м, чтобы не было щелей)
                let innerHTML = `<a-plane width="4.05" height="6" material="src: #wall-col; normalMap: #wall-nor; repeat: 2 3; roughness: 1;"></a-plane>`;
                
                // Если стена входит в список artWalls, вешаем картину
                if (artWalls.includes(i)) {
                    innerHTML += `
                        <a-entity position="0 -1.4 0.05">
                            <a-box width="0.66" height="0.9" depth="0.05" color="#000"></a-box>
                            <a-image src="assets/art${artCounter}.jpg?v=10" width="0.6" height="0.84" position="0 0 0.03"
                                     material="shader: standard; emissive: #fff; emissiveIntensity: 0.15"></a-image>
                            <a-box width="0.7" height="0.01" depth="0.01" position="0 -0.5 0.02" color="#4facfe"
                                   material="emissive:
