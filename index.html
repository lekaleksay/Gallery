<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Museum Dev Lab | Final Gallery</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; position: fixed; background: #fff; }
    </script>
</head>
<body>

<a-scene 
    renderer="colorManagement: true; exposure: 0.5;" 
    background="color: #333"
    light="defaultLightsEnabled: false">

    <a-light type="ambient" color="#fff" intensity="0.3"></a-light>

    <a-box position="0 1.5 0" width="4" height="3" depth="7" 
           material="color: #888; shader: standard; side: back;"></a-box>
    
    <a-box position="0 1 -2" color="red"></a-box>
</a-scene>

    <script>
       const gallery = document.querySelector('#gallery-walls');

const coords = [
    { x: -1.97, y: 1.6, z: -2.25, rot: 90 }, { x: -1.97, y: 1.6, z: -0.75, rot: 90 },
    { x: -1.97, y: 1.6, z: 0.75,  rot: 90 }, { x: -1.97, y: 1.6, z: 2.25,  rot: 90 },
    { x: 1.97,  y: 1.6, z: -2.25, rot: -90 }, { x: 1.97,  y: 1.6, z: -0.75, rot: -90 },
    { x: 1.97,  y: 1.6, z: 0.75,  rot: -90 }, { x: 1.97,  y: 1.6, z: 2.25,  rot: -90 },
    { x: -0.8,  y: 1.6, z: -3.47, rot: 0 }, { x: 0.8,   y: 1.6, z: -3.47, rot: 0 },
    { x: -0.8,  y: 1.6, z: 3.47,  rot: 180 }, { x: 0.8,   y: 1.6, z: 3.47,  rot: 180 }
];

coords.forEach((pos, i) => {
    const id = i + 1;
    const entity = document.createElement('a-entity');
    entity.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
    entity.setAttribute('rotation', `0 ${pos.rot} 0`);
    
    // Прямая вставка пути к картинке в src (без ожидания в assets)
    entity.innerHTML = `
        <a-box width="0.66" height="0.9" depth="0.03" color="#111"></a-box>
        <a-image src="assets/art${id}.jpg" width="0.6" height="0.84" position="0 0 0.02" 
                 material="shader: standard; emissive: #fff; emissiveIntensity: 0.1"></a-image>
    `;
    gallery.appendChild(entity);
});
    </script>
</body>
</html>
