<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Museum Dev Lab | Deep Fix</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>

    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; position: fixed; background-color: #ffffff;
        }
        /* Этот блок гарантирует, что canvas не «схлопнется» */
        canvas.a-canvas {
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            position: absolute !important;
        }
    </style>
</head>
<body>

    <a-scene 
      renderer="colorManagement: true; antialias: false; precision: medium;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
      embedded="false">

        <a-assets>
            <img id="floor-col" src="textures/floor_color.jpg">
            <img id="floor-nor" src="textures/floor_normal.jpg">
            <img id="art1" src="assets/art1.jpg">
            </a-assets>

        <a-sky color="#ffffff"></a-sky>

        <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
        <a-light type="point" position="0 2.5 0" intensity="0.3" distance="10"></a-light>

        <a-box position="0 1.5 0" width="4" height="3" depth="7" 
               material="color: #ffffff; shader: flat; side: back;"></a-box>

        <a-plane position="0 0.01 0" rotation="-90 0 0" width="4" height="7" 
                 material="src: #floor-col; normalMap: #floor-nor; repeat: 4 7; roughness: 0.8;"></a-plane>

        <a-entity position="-1.97 1.6 -2.25" rotation="0 90 0">
            <a-box width="0.66" height="0.9" depth="0.03" color="#111"></a-box>
            <a-image src="#art1" width="0.6" height="0.84" position="0 0 0.02" 
                     material="shader: standard; emissive: #fff; emissiveIntensity: 0.15"></a-image>
        </a-entity>
        <a-entity id="rig" movement-controls="controls: checkpoint" checkpoint-controls="mode: animate">
            <a-entity camera="near: 0.05;" position="0 1.6 0" look-controls="pointerLockEnabled: false; touchEnabled: true;">
                <a-cursor color="#555" raycaster="objects: .checkpoint"></a-cursor>
            </a-entity>
        </a-entity>

        <a-circle class="checkpoint" position="0 0.02 1.5" radius="0.15" color="#000" opacity="0.1" rotation="-90 0 0"></a-circle>
        <a-circle class="checkpoint" position="0 0.02 -1.5" radius="0.15" color="#000" opacity="0.1" rotation="-90 0 0"></a-circle>

    </a-scene>

    <script>
        // АГРЕССИВНЫЙ РЕСАЙЗ ДЛЯ ANDROID
        function forceResize() {
            window.scrollTo(0, 0); // Прячем адресную строку если можно
            const scene = document.querySelector('a-scene');
            if (scene) {
                scene.resize();
                // Принудительно ставим размер canvas по реальному окну
                const canvas = scene.canvas;
                if (canvas) {
                    canvas.style.width = window.innerWidth + 'px';
                    canvas.style.height = window.innerHeight + 'px';
                }
            }
        }

        // Запускаем серию проверок при загрузке
        window.addEventListener('load', () => {
            forceResize();
            setTimeout(forceResize, 200);
            setTimeout(forceResize, 1000);
        });

        // Исправляем при повороте экрана
        window.addEventListener('orientationchange', () => {
            setTimeout(forceResize, 500);
        });

        // Полноэкранный режим по тапу (убирает черные полосы в 99% случаев)
        document.body.addEventListener('click', function() {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log(e));
                setTimeout(forceResize, 300);
            }
        }, { once: true });
    </script>
</body>
</html>
